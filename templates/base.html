<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Analisador de Currículos{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="topbar">
  <div class="brand">{% block pagetitle %}NOVA ANÁLISE DE CURRÍCULO{% endblock %}</div>
  <nav class="nav">
    <a href="{{ url_for('new_analysis') }}">Nova Análise</a>
    <a href="{{ url_for('results_page') }}">Resultados</a>
  </nav>
  <div class="user">
    <div class="user-name">Avaliador IA</div>
    <div class="user-role">Gestor de RH</div>
  </div>
</header>
<main class="container">
  {% block content %}{% endblock %}
</main>
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
